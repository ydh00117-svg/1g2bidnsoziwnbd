<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARVI — AI Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --green: #00ff88;
    --green-dim: #00aa55;
    --green-dark: #003322;
    --blue: #0066ff;
    --purple: #8800ff;
    --bg: #000000;
    --bg2: #050a05;
    --text: #00ff88;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 16px; height: 16px;
    border: 1.5px solid var(--green);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.1s;
    box-shadow: 0 0 8px var(--green);
  }
  #cursor-dot {
    position: fixed;
    width: 4px; height: 4px;
    background: var(--green);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
  }

  /* Scanlines overlay */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,136,0.015) 2px,
      rgba(0,255,136,0.015) 4px
    );
    pointer-events:none;
    z-index:100;
  }

  /* Grid background */
  body::after {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
    z-index:0;
  }

  #app {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(0,255,136,0.2);
    padding-bottom: 10px;
    margin-bottom: 12px;
  }

  #logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(90deg, var(--green), var(--blue), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 10px rgba(0,255,136,0.5));
    letter-spacing: 6px;
  }

  #status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: var(--green-dim);
  }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.8); }
  }

  #mic-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--green-dim);
  }

  #mic-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    transition: all 0.3s;
  }

  #mic-dot.listening {
    background: #ff4444;
    box-shadow: 0 0 10px #ff4444;
    animation: pulse 0.5s infinite;
  }

  #mic-dot.speaking {
    background: var(--blue);
    box-shadow: 0 0 10px var(--blue);
    animation: pulse 0.8s infinite;
  }

  /* Terminal window */
  #terminal {
    flex: 1;
    background: rgba(0,10,0,0.8);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 4px;
    padding: 16px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.7;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dark) transparent;
    position: relative;
  }

  #terminal::-webkit-scrollbar { width: 4px; }
  #terminal::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }

  .line {
    display: flex;
    gap: 8px;
    margin-bottom: 2px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(4px); }
    to { opacity:1; transform:translateY(0); }
  }

  .line .prefix {
    color: var(--green-dim);
    white-space: nowrap;
    user-select: none;
  }

  .line.user .prefix { color: var(--blue); }
  .line.arvi .prefix { color: var(--green); }
  .line.system .prefix { color: var(--purple); }
  .line.error .prefix { color: #ff4444; }

  .line .content { flex:1; word-break: break-word; }
  .line.user .content { color: #aaddff; }
  .line.arvi .content { color: var(--green); }
  .line.system .content { color: rgba(136,0,255,0.8); }
  .line.error .content { color: #ff6666; }

  /* Typing cursor blink */
  .typing::after {
    content: '▋';
    animation: blink 0.7s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Voice visualizer */
  #visualizer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 40px;
    margin: 8px 0;
  }

  .bar {
    width: 3px;
    background: var(--green);
    border-radius: 2px;
    transition: height 0.1s ease;
    box-shadow: 0 0 4px var(--green);
    min-height: 3px;
  }

  /* Bottom bar */
  #bottom {
    margin-top: 10px;
    border-top: 1px solid rgba(0,255,136,0.15);
    padding-top: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(0,255,136,0.4);
  }

  #input-area {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,20,0,0.6);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 4px;
    padding: 8px 12px;
    margin-top: 8px;
  }

  #input-area span { color: var(--green-dim); }

  #text-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    caret-color: var(--green);
  }

  #text-input::placeholder { color: rgba(0,255,136,0.2); }

  /* Activation overlay */
  #activation {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.97);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  #activation.hidden { display: none; }

  #arvi-eye {
    width: 120px; height: 120px;
    position: relative;
    animation: rotate 8s linear infinite;
  }

  @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  #activate-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 8px;
    color: var(--green);
    text-align: center;
    animation: flicker 2s infinite;
  }

  #activate-sub {
    font-size: 12px;
    color: var(--green-dim);
    letter-spacing: 3px;
    text-align: center;
    animation: typewriter 2s steps(22) forwards;
    overflow: hidden;
    white-space: nowrap;
    width: 0;
    margin: 0 auto;
  }

  @keyframes typewriter { to { width: 100%; } }

  @keyframes flicker {
    0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.3} 95%{opacity:1} 97%{opacity:0.6} 98%{opacity:1}
  }

  #progress-bar {
    width: 260px;
    height: 2px;
    background: rgba(0,255,136,0.1);
    border-radius: 1px;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--blue));
    width: 0%;
    transition: width 0.05s;
    box-shadow: 0 0 8px var(--green);
  }

  /* Glitch effect */
  .glitch {
    animation: glitch 0.3s;
  }

  @keyframes glitch {
    0%{transform:translate(0)} 20%{transform:translate(-2px,1px)} 40%{transform:translate(2px,-1px)} 60%{transform:translate(-1px,2px)} 80%{transform:translate(1px,-2px)} 100%{transform:translate(0)}
  }

  /* URL open notification */
  .url-tag {
    display: inline-block;
    background: rgba(0,102,255,0.15);
    border: 1px solid rgba(0,102,255,0.4);
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    color: var(--blue);
    margin-left: 6px;
    cursor: pointer;
  }

  .url-tag:hover { background: rgba(0,102,255,0.3); }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-dot"></div>

<!-- Activation Screen -->
<div id="activation">
  <svg id="arvi-eye" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <polygon points="60,5 110,32 110,88 60,115 10,88 10,32" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.8"/>
    <polygon points="60,18 98,40 98,80 60,102 22,80 22,40" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.4"/>
    <circle cx="60" cy="60" r="22" fill="none" stroke="#0066ff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="60" cy="60" r="10" fill="#050a05" stroke="#8800ff" stroke-width="1.2"/>
    <circle cx="60" cy="60" r="4" fill="#00ff88" opacity="0.9"/>
    <circle cx="60" cy="60" r="8" fill="rgba(0,255,136,0.1)"/>
    <defs>
      <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00ff88"/>
        <stop offset="50%" stop-color="#0066ff"/>
        <stop offset="100%" stop-color="#8800ff"/>

  </svg>
  <div id="activate-text">ARVI ACTIVATED</div>

</div>

<!-- Main App -->
<div id="app">
  <div id="header">
    <div id="logo">ARVI</div>
    <div id="status-bar">
      <div id="mic-indicator">
        <div id="mic-dot"></div>
        <span id="mic-label">STANDBY</span>
      </div>
      <div style="width:1px;height:14px;background:rgba(0,255,136,0.2)"></div>
      <div id="status-dot"></div>
      <span>ONLINE</span>
    </div>
  </div>

  <div id="terminal">
    <div class="line system">
      <span class="prefix">[SYS]</span>
      <span class="content">ARVI v1.0 — AI Agent aktif. Sistem siap.</span>
    </div>
    <div class="line system">
      <span class="prefix">[SYS]</span>
      <span class="content">Mikrofon auto-detect aktif. Mulai bicara...</span>
    </div>
  </div>

  <div id="visualizer">
    <!-- bars generated by JS -->
  </div>

  <div id="input-area">
    <span>›</span>
    <input id="text-input" placeholder="atau ketik perintah di sini..." autocomplete="off"/>
  </div>

  <div id="bottom">
    <span id="bottom-left">GROQ · LLAMA-3.3-70B</span>
    <span id="bottom-right">AUTO VOICE DETECT · ON</span>
  </div>
</div>

<script>
const GROQ_API_KEY = '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';
const GROQ_MODEL = 'llama-3.3-70b-versatile';

const SYSTEM_PROMPT = `Kamu adalah ARVI, sebuah AI Agent canggih dengan kepribadian seperti ksatria digital yang setia, tegas, dan profesional. 
Kamu berbicara dalam bahasa Indonesia, singkat dan to the point seperti seorang agen elit.
Kamu bisa membuka website/aplikasi web jika user memerintahkan. Ketika user minta buka website, selalu sertakan tag [OPEN_URL:url_lengkap] di akhir responmu.
Contoh: jika user bilang "buka youtube", balas dengan teks lalu tambahkan [OPEN_URL:https://youtube.com]
Jika user bilang "buka google", tambahkan [OPEN_URL:https://google.com]
Jika user menyebut nama app/website lain, cari URL yang sesuai.
Jangan terlalu panjang dalam menjawab. Maksimal 2-3 kalimat.`;

// State
let conversationHistory = [];
let isProcessing = false;
let isSpeaking = false;
let recognition = null;
let synth = window.speechSynthesis;
let selectedVoice = null;
let audioContext = null;
let analyser = null;
let micStream = null;
let silenceTimer = null;
let isListening = false;
let currentTranscript = '';

// Cursor
const cursor = document.getElementById('cursor');
const cursorDot = document.getElementById('cursor-dot');
document.addEventListener('mousemove', e => {
  cursor.style.left = (e.clientX - 8) + 'px';
  cursor.style.top = (e.clientY - 8) + 'px';
  cursorDot.style.left = (e.clientX - 2) + 'px';
  cursorDot.style.top = (e.clientY - 2) + 'px';
});

// Visualizer bars
const viz = document.getElementById('visualizer');
const BARS = 32;
for(let i=0;i<BARS;i++){
  const b = document.createElement('div');
  b.className = 'bar';
  b.style.height = '3px';
  viz.appendChild(b);
}
const bars = viz.querySelectorAll('.bar');

function animateBars(data) {
  if(!data) {
    bars.forEach(b => b.style.height = '3px');
    return;
  }
  bars.forEach((b,i) => {
    const idx = Math.floor(i * data.length / BARS);
    const val = data[idx] / 255;
    const h = Math.max(3, val * 36);
    b.style.height = h + 'px';
    b.style.opacity = 0.4 + val * 0.6;
  });
}

let vizAnimFrame;
function startVizFromMic() {
  if(!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  function loop() {
    analyser.getByteFrequencyData(data);
    animateBars(data);
    vizAnimFrame = requestAnimationFrame(loop);
  }
  loop();
}
function stopViz() {
  cancelAnimationFrame(vizAnimFrame);
  animateBars(null);
}

// Terminal log
function log(type, content) {
  const terminal = document.getElementById('terminal');
  const line = document.createElement('div');
  line.className = 'line ' + type;
  const prefixMap = { user:'[USR]', arvi:'[ARVI]', system:'[SYS]', error:'[ERR]' };
  line.innerHTML = `<span class="prefix">${prefixMap[type]||'[?]'}</span><span class="content">${content}</span>`;
  terminal.appendChild(line);
  terminal.scrollTop = terminal.scrollHeight;
  return line;
}

function logTyping(type, text) {
  return new Promise(resolve => {
    const terminal = document.getElementById('terminal');
    const line = document.createElement('div');
    line.className = 'line ' + type;
    const prefixMap = { user:'[USR]', arvi:'[ARVI]', system:'[SYS]', error:'[ERR]' };
    const contentSpan = document.createElement('span');
    contentSpan.className = 'content typing';
    line.innerHTML = `<span class="prefix">${prefixMap[type]||'[?]'}</span>`;
    line.appendChild(contentSpan);
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;

    let i = 0;
    const speed = Math.max(15, Math.min(40, 2000 / text.length));
    const interval = setInterval(() => {
      contentSpan.textContent = text.slice(0, i);
      i++;
      terminal.scrollTop = terminal.scrollHeight;
      if(i > text.length) {
        clearInterval(interval);
        contentSpan.classList.remove('typing');
        resolve();
      }
    }, speed);
  });
}

// Load voices - force deep male voice
function loadVoices() {
  const voices = synth.getVoices();
  if(!voices || voices.length === 0) return;

  // Log all voices for debug
  console.log('Available voices:', voices.map(v => v.name + ' | ' + v.lang));

  // Priority: deep male English voices
  const preferred = [
    'Google UK English Male',
    'Microsoft David - English (United States)',
    'Microsoft Mark - English (United States)',
    'Daniel',
    'Alex',
    'Arthur',
    'en-GB-Standard-B',
    'Google US English'
  ];

  for(const name of preferred) {
    const v = voices.find(v => v.name.includes(name));
    if(v) { selectedVoice = v; console.log('Selected voice:', v.name); break; }
  }

  // Fallback: any male English voice
  if(!selectedVoice) {
    selectedVoice = voices.find(v =>
      v.lang.startsWith('en') && (
        v.name.toLowerCase().includes('male') ||
        v.name.toLowerCase().includes('david') ||
        v.name.toLowerCase().includes('mark') ||
        v.name.toLowerCase().includes('daniel') ||
        v.name.toLowerCase().includes('alex')
      )
    ) || voices.find(v => v.lang.startsWith('en')) || voices[0];
    if(selectedVoice) console.log('Fallback voice:', selectedVoice.name);
  }
}
if('onvoiceschanged' in synth) { synth.onvoiceschanged = loadVoices; }
loadVoices();
setTimeout(loadVoices, 500);
setTimeout(loadVoices, 1500);

// Speak - fixed for Android Chrome
function speak(text) {
  return new Promise(resolve => {
    const clean = text.replace(/\[OPEN_URL:[^\]]+\]/g,'').trim();
    if(!clean) { resolve(); return; }

    synth.cancel();
    setTimeout(() => {
      loadVoices();
      const utter = new SpeechSynthesisUtterance(clean);
      if(selectedVoice) utter.voice = selectedVoice;
      utter.rate = 0.78;   // slower = clearer
      utter.pitch = 0.5;   // lowest pitch = deepest male
      utter.volume = 1;
      utter.lang = 'en-GB'; // UK English = deeper/clearer

      isSpeaking = true;
      setMicState('speaking');

      let speakAnim = 0;
      const speakInterval = setInterval(() => {
        const fake = new Uint8Array(BARS);
        for(let i=0;i<BARS;i++) fake[i] = Math.random() * 180 * Math.abs(Math.sin(speakAnim + i*0.3));
        speakAnim += 0.15;
        animateBars(fake);
      }, 60);

      let endFired = false;
      const estDuration = Math.max(3000, (clean.length / 12) * 1000 + 2000);
      const fallback = setTimeout(() => {
        if(endFired) return;
        endFired = true;
        clearInterval(speakInterval);
        stopViz();
        isSpeaking = false;
        resolve();
      }, estDuration);

      utter.onend = () => {
        if(endFired) return;
        endFired = true;
        clearTimeout(fallback);
        clearInterval(speakInterval);
        stopViz();
        isSpeaking = false;
        resolve();
      };
      utter.onerror = () => {
        if(endFired) return;
        endFired = true;
        clearTimeout(fallback);
        clearInterval(speakInterval);
        isSpeaking = false;
        resolve();
      };

      synth.speak(utter);

      // Android: prevent browser from pausing long utterances
      const keepAlive = setInterval(() => {
        if(!synth.speaking) { clearInterval(keepAlive); return; }
        if(synth.paused) synth.resume();
      }, 500);
    }, 150);
  });
}

// Mic state
function setMicState(state) {
  const dot = document.getElementById('mic-dot');
  const label = document.getElementById('mic-label');
  dot.className = 'mic-dot';
  if(state === 'listening') {
    dot.id = 'mic-dot';
    dot.classList.add('listening');
    label.textContent = 'MENDENGAR';
  } else if(state === 'speaking') {
    dot.id = 'mic-dot';
    dot.classList.add('speaking');
    label.textContent = 'ARVI BICARA';
  } else {
    label.textContent = 'STANDBY';
  }
}

// Groq API
async function askGroq(userMessage) {
  conversationHistory.push({ role:'user', content: userMessage });

  const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${GROQ_API_KEY}`
    },
    body: JSON.stringify({
      model: GROQ_MODEL,
      messages: [
        { role:'system', content: SYSTEM_PROMPT },
        ...conversationHistory
      ],
      max_tokens: 200,
      temperature: 0.7
    })
  });

  if(!response.ok) throw new Error('Groq API error: ' + response.status);
  const data = await response.json();
  const reply = data.choices[0].message.content;
  conversationHistory.push({ role:'assistant', content: reply });
  return reply;
}

// Extract and open URL
function handleOpenURL(text) {
  const match = text.match(/\[OPEN_URL:([^\]]+)\]/);
  if(match) {
    const url = match[1];
    window.open(url, '_blank');
    log('system', `Membuka: <span class="url-tag" onclick="window.open('${url}','_blank')">${url}</span>`);
    return text.replace(/\[OPEN_URL:[^\]]+\]/g, '');
  }
  return text;
}

// Process command
async function processCommand(input) {
  if(!input.trim() || isProcessing) return;
  isProcessing = true;

  log('user', input);

  try {
    const loadLine = log('arvi', '...');

    const reply = await askGroq(input);
    loadLine.remove();

    const cleanReply = handleOpenURL(reply);
    await logTyping('arvi', cleanReply);
    await speak(cleanReply);

  } catch(err) {
    log('error', 'Gagal terhubung ke server: ' + err.message);
  }

  isProcessing = false;
  startAutoListen();
}

// Voice Recognition with auto-detect
function startAutoListen() {
  if(isSpeaking || isProcessing) return;
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    log('error', 'Browser tidak mendukung voice recognition. Gunakan Chrome.');
    return;
  }

  if(recognition) { try { recognition.stop(); } catch(e){} }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'id-ID';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    setMicState('listening');
    startVizFromMic();
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for(let i = e.resultIndex; i < e.results.length; i++) {
      if(e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    currentTranscript = final || interim;
  };

  recognition.onend = () => {
    isListening = false;
    stopViz();
    setMicState('standby');
    if(currentTranscript.trim()) {
      const t = currentTranscript.trim();
      currentTranscript = '';
      processCommand(t);
    } else {
      // restart listening
      setTimeout(() => { if(!isSpeaking && !isProcessing) startAutoListen(); }, 300);
    }
  };

  recognition.onerror = (e) => {
    isListening = false;
    currentTranscript = '';
    if(e.error !== 'no-speech' && e.error !== 'aborted') {
      log('error', 'Mic error: ' + e.error);
    }
    setTimeout(() => { if(!isSpeaking && !isProcessing) startAutoListen(); }, 1000);
  };

  try { recognition.start(); } catch(e) {}
}

// Text input
document.getElementById('text-input').addEventListener('keydown', async (e) => {
  if(e.key === 'Enter') {
    const val = e.target.value.trim();
    e.target.value = '';
    if(val) {
      if(recognition) { try { recognition.stop(); } catch(ex){} }
      await processCommand(val);
    }
  }
});

// Activation animation
function runActivation() {
  const overlay = document.getElementById('activation');
  const fill = document.getElementById('progress-fill');
  let p = 0;
  const interval = setInterval(() => {
    p += 1.2;
    fill.style.width = Math.min(p,100) + '%';
    if(p >= 100) {
      clearInterval(interval);
      setTimeout(async () => {
        overlay.classList.add('hidden');
        await speak("ARVI activated. What is your command.");
        log('system', 'Voice recognition aktif. Silakan bicara...');
        startAutoListen();
      }, 400);
    }
  }, 35);
}

// Boot
window.addEventListener('load', () => {
  setTimeout(runActivation, 600);
});

// Keep listening loop
setInterval(() => {
  if(!isSpeaking && !isProcessing && !isListening) {
    startAutoListen();
  }
}, 3000);
</script>
</body>
